<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Minha Primeira Página - Tx</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <button id="myOwnButton">experimento</button>
        <p></p> <input type="text" placeholder="Go on! type something">
    </div>
    
    <h1>Primeiro Cabeçalho</h1>
    <p id="p1">Este é um parágrafo de texto.</p>
    <button id="button">Clique aqui</button>

    <script>
	const  button = document.getElementById("myOwnButton");
	const myInput = document.querySelector("input");
	const  pgf = document.getElementById("p1");

	function handleClick(){
		const typedText = myInput.value;

		if (!typedText)
			return ;
		pgf.textContent = "Enviando para o servidor";

		fetch("http://127.0.0.1:3000", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({ text: typedText })
		})
		
		.then( function (resp) {
			return resp.json();
		})

		.then( function (serverData) {
			pgf.textContent = `${serverData.msg}, Conteúdo: "${serverData.receivedContent}" (Tamanho: ${serverData.length} caracteres)`;

		})
		.catch(function (error) {
			pgf.textContent = "Fail to connect with server.";
			console.error("Requisition Error:", error);
		});
	}
	button.addEventListener("click", handleClick);
    </script>
</body>
</html>
