<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastro de usuários</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        	<h2>Criar Conta</h2>
        
        	<label>Nome Completo:</label><br>
        	<input type="text" id="regNome" placeholder="Ex: Tchiadi Xavier" style="width: 100%; margin-bottom: 15px;"><br>

        	<label>E-mail:</label><br>
        	<input type="email" id="regEmail" placeholder="tx@email.com" style="width: 100%; margin-bottom: 15px;"><br>

        	<label>Senha:</label><br>
        	<input type="password" id="regSenha" placeholder="******" style="width: 100%; margin-bottom: 15px;"><br>

        	<button id="btnRegistrar" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer;">Registrar</button>
        
        	<p id="mensagemErro" style="color: red; margin-top: 15px;"></p>
	</div>

	<script>
		
	</script>
</body>
</html>
